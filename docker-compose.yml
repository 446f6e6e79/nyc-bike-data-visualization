services:
  postgres:                                                       # PostgreSQL database service
    build:                                                        # Initialize the PostgreSQL service by building the image from the specified context and Dockerfile
      context: .                                                                    
      dockerfile: dockers/Dockerfile.postgres
    image: ${IMAGE_PREFIX:-nyc-bike-local}-postgres:${TAG:-latest}
    container_name: NYC-Bike-Visualisation-Postgres
    environment:                                                  # Environment variables for PostgreSQL configuration
      POSTGRES_DB: citibike
      POSTGRES_USER: citibike
      POSTGRES_PASSWORD: citibike
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:                                                 # Health check to ensure the PostgreSQL service is ready before other services depend on it                        
      test: ["CMD-SHELL", "pg_isready -U citibike -h 127.0.0.1"]
      interval: 5s
      timeout: 5s
      retries: 10

  seeder:                                                       # Service of data seeding service that populates the database with initial data
    build:                                                      # Build the seeder image from the specified context and Dockerfile
      context: .
      dockerfile: dockers/Dockerfile.seeder
      args:                                                     # Build arguments for the seeder image
        DATA_START_DATE: ${DATA_START_DATE:-}
        DATA_END_DATE: ${DATA_END_DATE:-}
        DOWNLOAD_JC: ${DOWNLOAD_JC:-}
    container_name: NYC-Bike-Visualisation-Seeder
    image: ${IMAGE_PREFIX:-nyc-bike-local}-seeder:${TAG:-latest}
    depends_on:
      postgres:                                                 # Ensure the seeder service only starts after the PostgreSQL service is healthy
        condition: service_healthy
    environment:                                                # Environment variables for the seeder service, including database connection details and optional parameters for data seeding
      DATABASE_URL: postgresql://citibike:citibike@postgres:5432/citibike
    volumes:
      - app_data:/app/data

  backend:                                                      # Backend service that provides the API for the application          
    build:
      context: .
      dockerfile: dockers/Dockerfile.backend
    image: ${IMAGE_PREFIX:-nyc-bike-local}-backend:${TAG:-latest}
    container_name: NYC-Bike-Visualisation-Backend
    init: true                                                  # Use an init system to handle signal forwarding and process reaping, ensuring graceful shutdowns              
    depends_on:                                                 # Ensure the backend service only starts after the seeder service has completed successfully
      postgres:
        condition: service_healthy
      seeder:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://citibike:citibike@postgres:5432/citibike
    volumes:
      - app_data:/app/data
    ports:
      - "8000:8000"
    stop_signal: SIGINT
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/openapi.json', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 40
      start_period: 60s

  frontend:                                                   # Frontend service that serves the user interface of the application                
    build:
      context: .
      dockerfile: dockers/Dockerfile.frontend
    image: ${IMAGE_PREFIX:-nyc-bike-local}-frontend:${TAG:-latest}
    container_name: NYC-Bike-Visualisation-Frontend
    init: true
    depends_on:
      - backend
    ports:
      - "5173:5173"
    stop_signal: SIGINT
    stop_grace_period: 5s

volumes:                                                      # Define named volumes for persistent data storage
  pg_data:                                                    # Volume for PostgreSQL data
  app_data:                                                   # Volume for application data used by the seeder and backend services                   
