name: Docker Action Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker-compose.yml
      - dockers/**
      - .github/workflows/docker-check.yml
      - src/**
      - scripts/**
  pull_request:
    paths:
      - docker-compose.yml
      - dockers/**
      - .github/workflows/docker-check.yml
      - src/**
      - scripts/**

jobs:
  validate-docker-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker setup files
        run: |
          set -euo pipefail
          test -f docker-compose.yml
          test -f dockers/Dockerfile.backend
          test -f dockers/Dockerfile.frontend
          grep -q "dockerfile: dockers/Dockerfile.backend" docker-compose.yml
          grep -q "dockerfile: dockers/Dockerfile.frontend" docker-compose.yml
          grep -q '"8000:8000"' docker-compose.yml
          grep -q '"5173:5173"' docker-compose.yml

      - name: Validate compose syntax
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Build and start services
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml up -d --build

      - name: Verify published ports
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml port backend 8000
          docker compose -f docker-compose.yml port frontend 5173

      - name: Check backend and frontend liveness
        run: |
          set -euo pipefail
          sleep 10
          count=0
          while true; do
            count=$((count + 1))
            echo "Liveness check iteration ${count} at $(date -u +%Y-%m-%dT%H:%M:%SZ)"

            if ! curl -fsS http://localhost:8000/docs > /dev/null; then
              echo "Backend liveness check failed on iteration ${count}" >&2
              exit 1
            fi

            if ! curl -fsS http://localhost:5173 > /dev/null; then
              echo "Frontend liveness check failed on iteration ${count}" >&2
              exit 1
            fi

            sleep 5
          done

      - name: Tear down Docker compose setup
        if: always()
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml down -v
