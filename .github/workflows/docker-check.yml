name: Docker CI Check

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docker-compose.yml
      - dockers/**
      - .github/workflows/docker-check.yml
      - src/**
      - scripts/**
  pull_request:
    paths:
      - docker-compose.yml
      - dockers/**
      - .github/workflows/docker-check.yml
      - src/**
      - scripts/**

jobs:
  validate-docker-setup:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker setup files
        run: |
          set -euo pipefail
          test -f docker-compose.yml
          test -f dockers/Dockerfile.backend
          test -f dockers/Dockerfile.frontend
          grep -q "dockerfile: dockers/Dockerfile.backend" docker-compose.yml
          grep -q "dockerfile: dockers/Dockerfile.frontend" docker-compose.yml
          grep -q '"8000:8000"' docker-compose.yml
          grep -q '"5173:5173"' docker-compose.yml

      - name: Validate compose syntax
        run: docker compose -f docker-compose.yml config > /dev/null

      - name: Build and start services
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml up -d --build

      - name: Verify published ports
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml port backend 8000
          docker compose -f docker-compose.yml port frontend 5173

      - name: Check backend and frontend liveness
        run: |
          count=0
          max_retries=20

          until curl -fsS http://localhost:5173 > /dev/null; do
            count=$((count + 1))
            echo "Frontend not ready yet (${count}/${max_retries})..."
            sleep 10
          done
          echo "Frontend is up!"  
          count=0

          until curl -fsS http://localhost:8000/docs > /dev/null; do
            count=$((count + 1))
            echo "Backend not ready yet (${count}/${max_retries})..."

            if [ $count -ge $max_retries ]; then
              echo "Backend failed to start in time" >&2
              docker compose logs backend
              exit 1
            fi

            sleep 20
          done

          echo "Backend is up!"

      - name: Tear down Docker compose setup
        if: always()
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml down -v
