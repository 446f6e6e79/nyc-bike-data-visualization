name: Backend Tests

on:
  push:
    branches:
      - main
    paths:
      - "src/backend/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/backend-tests.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/backend/**"
      - "scripts/**"
      - "requirements.txt"
      - ".github/workflows/backend-tests.yml"

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: citibike
          POSTGRES_PASSWORD: citibike
          POSTGRES_DB: citibike
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create test database
        env:
          PGPASSWORD: citibike
        run: |
          psql -h localhost -U citibike -c "CREATE DATABASE citibike_test;"
          psql -h localhost -U citibike -d citibike_test -c "GRANT ALL ON SCHEMA public TO citibike;"

      - name: Seed test database
        env:
          DATABASE_URL: postgresql://citibike:citibike@localhost:5432/citibike_test
        run: python scripts/load_test_data.py

      - name: Run backend integration tests
        env:
          DATABASE_URL: postgresql://citibike:citibike@localhost:5432/citibike_test
        run: |
          python -m uvicorn src.backend.main:app --host 127.0.0.1 --port 8000 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT

          python - <<'PY'
          import time
          import urllib.request
          for _ in range(30):
              try:
                  with urllib.request.urlopen("http://127.0.0.1:8000/docs", timeout=2):
                      break
              except Exception:
                  time.sleep(1)
          else:
              raise SystemExit("Backend server did not become ready in time.")
          PY

          cd src/backend
          pytest tests -q
