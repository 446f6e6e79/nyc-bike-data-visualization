name: Docker Release Pipeline

# At the release of a new version, this workflow builds and pushes Docker images for all services 
on:
  release:
    types: [published]

# Define environment variables for the workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true                                         
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nyc-bike-data-visualisation
  PLATFORMS: linux/amd64,linux/arm64                   # Define the platforms for multi-architecture builds

jobs:
  build:                                               # Builds and pushes Docker images for all services, and generates a release-specific docker-compose file
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      tag: ${{ steps.tag.outputs.value }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU                               # Set up QEMU for building multi-architecture images
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx                      # Set up Docker Buildx for advanced build capabilities
        uses: docker/setup-buildx-action@v3

      - name: Extract release tag                       # Extract the tag name from the GitHub release event and set it as an output for use in subsequent steps                     
        id: tag
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Build and push postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.postgres
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-postgres:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-postgres:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push seeder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.seeder
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-seeder:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-seeder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.backend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.frontend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate docker-compose.release.yml
        env:
          TAG: ${{ steps.tag.outputs.value }}
          PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          yq eval "
            .services.postgres.image = strenv(PREFIX) + \"-postgres:\" + strenv(TAG) |
            .services.seeder.image   = strenv(PREFIX) + \"-seeder:\"   + strenv(TAG) |
            .services.backend.image  = strenv(PREFIX) + \"-backend:\"  + strenv(TAG) |
            .services.frontend.image = strenv(PREFIX) + \"-frontend:\" + strenv(TAG) |
            del(.services.*.build)
          " docker-compose.yml > docker-compose.release.yml

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Data Visualisation Docker Release ${{ steps.tag.outputs.value }}
          files: docker-compose.release.yml

  seed:                                          # Seeds the database with initial data using the seeder image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start postgres container for seeding              # Start a PostgreSQL container 
        run: |
          docker run -d --name pg \
            -e POSTGRES_DB=citibike \
            -e POSTGRES_USER=citibike \
            -e POSTGRES_PASSWORD=citibike \
            ${{ env.IMAGE_PREFIX }}-postgres:${{ needs.build.outputs.tag }}
          until docker exec pg pg_isready -U citibike -d citibike; do
            echo "Waiting for postgres..."; sleep 3
          done

      - name: Seed default dataset                              # Run the seeder container with the appropriate environment variables and network settings to seed the database
        timeout-minutes: 120
        run: |
          docker run --rm \
            --network container:pg \
            -e DATABASE_URL=postgresql://citibike:citibike@localhost:5432/citibike \
            ${{ env.IMAGE_PREFIX }}-seeder:${{ needs.build.outputs.tag }}

      - name: Export database dump                              # After seeding, export the database dump in a compressed format
        run: |
          docker exec pg pg_dump -U citibike --no-owner --no-privileges citibike \
            | gzip > citibike_data.sql.gz
          echo "Dump size: $(du -sh citibike_data.sql.gz | cut -f1)"

      - name: Stop and remove postgres container                # Remove the PostgreSQL container used for seeding
        if: always()
        run: docker rm -f pg

      - name: Prepare preloaded Dockerfile                      # Create a new PostgreSQL for multi-arch build that includes the seeded data by copying the initialization scripts and the database dump into a new Dockerfile based on the official PostgreSQL image
        run: |
          cat > /tmp/Dockerfile.preloaded << 'EOF'
          FROM postgres:16-alpine
          COPY postgres/init/ /docker-entrypoint-initdb.d/
          RUN sed -i 's/\r//' /docker-entrypoint-initdb.d/*.sh
          COPY citibike_data.sql.gz /docker-entrypoint-initdb.d/99_citibike_data.sql.gz
          EOF

      - name: Build and push preloaded postgres image           # Build and push a new PostgreSQL image 
        uses: docker/build-push-action@v6
        with:
          context: .
          file: /tmp/Dockerfile.preloaded
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-postgres:${{ needs.build.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-postgres:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
