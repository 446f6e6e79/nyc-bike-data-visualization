name: Publish Docker Images

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/data-visualisation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build images via docker compose
        run: docker compose -f docker-compose.yml build

      - name: Tag and push backend
        run: |
          backend_image_id="$(docker compose -f docker-compose.yml images -q backend)"
          test -n "${backend_image_id}"
          docker tag "${backend_image_id}" ${{ env.IMAGE_PREFIX }}-backend:latest
          docker push ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Tag and push frontend
        run: |
          frontend_image_id="$(docker compose -f docker-compose.yml images -q frontend)"
          test -n "${frontend_image_id}"
          docker tag "${frontend_image_id}" ${{ env.IMAGE_PREFIX }}-frontend:latest
          docker push ${{ env.IMAGE_PREFIX }}-frontend:latest