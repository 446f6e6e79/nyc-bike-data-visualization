name: Docker Release Pipeline

on:
  # ONLY triggers when a new release is published
  release:
    types: [published]

# Environment variables for the workflow
env:
  # This forces the use of Node 24 for compatibility 
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nyc-bike-data-visualisation
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU                
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx            
        uses: docker/setup-buildx-action@v3
      
      # Extract the release tag from the GitHub event context
      - name: Extract release tag
        id: tag
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
       
      - name: Build and push postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.postgres
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-postgres:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-postgres:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.backend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.frontend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate versioned docker-compose for release
        env:
          TAG: ${{ steps.tag.outputs.value }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          set -euo pipefail
          echo "Generating docker-compose.release.yml with pinned image tags."
          pip install pyyaml -q
          python3 - << 'EOF'
          import os, yaml

          tag = os.environ["TAG"]
          prefix = os.environ["IMAGE_PREFIX"]

          image_map = {
              "dockers/Dockerfile.backend":  f"{prefix}-backend:{tag}",
              "dockers/Dockerfile.frontend": f"{prefix}-frontend:{tag}",
              "dockers/Dockerfile.postgres": f"{prefix}-postgres:{tag}",
          }

          with open("docker-compose.yml") as f:
              compose = yaml.safe_load(f)

          for svc in compose["services"].values():
              build = svc.pop("build", {})
              dockerfile = build.get("dockerfile")
              if dockerfile in image_map:
                  svc["image"] = image_map[dockerfile]

          with open("docker-compose.release.yml", "w") as f:
              yaml.dump(compose, f, default_flow_style=False, sort_keys=False)

          print("docker-compose.release.yml generated.")
          EOF

      - name: Verify release assets exist
        run: |
          set -euo pipefail
          test -s docker-compose.release.yml || { echo "docker-compose.release.yml is missing or empty!"; exit 1; }
          echo "Release assets verified."
      # Once the docker-compose file is generated and verified, we can attach it to the GitHub Release
      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Data Visualisation Docker Release ${{ steps.tag.outputs.value }}
          files: |
            docker-compose.release.yml