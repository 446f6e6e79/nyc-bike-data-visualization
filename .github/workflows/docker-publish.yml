name: Docker CD pipeline

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/data-visualisation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME:-latest}" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          set -euo pipefail
          docker build \
            -f dockers/Dockerfile.backend \
            -t ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }} \
            -t ${{ env.IMAGE_PREFIX }}-backend:latest \
            .

      - name: Push backend image
        run: |
          set -euo pipefail
          docker push ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }}
          docker push ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build frontend image
        run: |
          set -euo pipefail
          docker build \
            -f dockers/Dockerfile.frontend \
            -t ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }} \
            -t ${{ env.IMAGE_PREFIX }}-frontend:latest \
            .

      - name: Push frontend image
        run: |
          set -euo pipefail
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }}
          docker push ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Generate versioned docker-compose for release
        run: |
          set -euo pipefail
          TAG=${{ steps.tag.outputs.value }}
          sed \
            -e "s|dockerfile: dockers/Dockerfile.backend|image: ${{ env.IMAGE_PREFIX }}-backend:${TAG}|" \
            -e "s|dockerfile: dockers/Dockerfile.frontend|image: ${{ env.IMAGE_PREFIX }}-frontend:${TAG}|" \
            -e '/context: \./d' \
            -e '/build:/d' \
            docker-compose.yml > docker-compose.release.yml

      - name: Generate install script
        env:
          TAG: ${{ steps.tag.outputs.value }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          set -euo pipefail
          cat > setup.sh << SCRIPT
          #!/usr/bin/env bash
          set -euo pipefail

          TAG="${TAG}"
          REPO="${REPO}"
          OWNER="${OWNER}"
          COMPOSE_URL="https://github.com/\${REPO}/releases/download/\${TAG}/docker-compose.release.yml"
          INSTALL_DIR="\${HOME}/.data-visualisation"

          echo "==> Checking dependencies..."
          command -v docker >/dev/null 2>&1 || { echo "Docker is required but not installed. Aborting."; exit 1; }
          docker compose version >/dev/null 2>&1 || { echo "Docker Compose (v2) is required but not found. Aborting."; exit 1; }

          echo "==> Pulling images..."
          docker pull ${IMAGE_PREFIX}-backend:\${TAG}
          docker pull ${IMAGE_PREFIX}-frontend:\${TAG}

          echo "==> Downloading compose file to \${INSTALL_DIR}..."
          mkdir -p "\${INSTALL_DIR}"
          curl -fsSL "\${COMPOSE_URL}" -o "\${INSTALL_DIR}/docker-compose.yml"

          echo ""
          echo "Done! To start the application run:"
          echo ""
          echo "  docker compose -f \${INSTALL_DIR}/docker-compose.yml up"
          echo ""
          SCRIPT
          chmod +x setup.sh

      - name: Attach assets to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            docker-compose.release.yml
            setup.sh