name: Docker Release Pipeline

on:
  workflow_dispatch:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nyc-bike-data-visualisation

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract release tag
        id: tag
        run: echo "value=${GITHUB_REF_NAME:-latest}" >> $GITHUB_OUTPUT

      - name: Build backend image
        run: |
          set -euo pipefail
          echo "Building backend image for tag '${{ steps.tag.outputs.value }}'."
          docker build \
            -f dockers/Dockerfile.backend \
            -t ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }} \
            -t ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }} \
            -t ${{ env.IMAGE_PREFIX }}-backend:latest \
            .

      - name: Push backend image
        run: |
          set -euo pipefail
          echo "Pushing backend image tags."
          docker push ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }}
          docker push ${{ env.IMAGE_PREFIX }}-backend:${{ steps.tag.outputs.value }}
          docker push ${{ env.IMAGE_PREFIX }}-backend:latest

      - name: Build frontend image
        run: |
          set -euo pipefail
          echo "Building frontend image for tag '${{ steps.tag.outputs.value }}'."
          docker build \
            -f dockers/Dockerfile.frontend \
            -t ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }} \
            -t ${{ env.IMAGE_PREFIX }}-frontend:latest \
            .

      - name: Push frontend image
        run: |
          set -euo pipefail
          echo "Pushing frontend image tags."
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }}
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${{ steps.tag.outputs.value }}
          docker push ${{ env.IMAGE_PREFIX }}-frontend:latest

      - name: Generate versioned docker-compose for release
        env:
          TAG: ${{ steps.tag.outputs.value }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          set -euo pipefail
          echo "Generating docker-compose.release.yml with pinned image tags."
          pip install pyyaml -q
          python3 - << 'EOF'
          import os, yaml

          tag = os.environ["TAG"]
          prefix = os.environ["IMAGE_PREFIX"]

          image_map = {
              "dockers/Dockerfile.backend":  f"{prefix}-backend:{tag}",
              "dockers/Dockerfile.frontend": f"{prefix}-frontend:{tag}",
          }

          with open("docker-compose.yml") as f:
              compose = yaml.safe_load(f)

          for svc in compose["services"].values():
              build = svc.pop("build", {})
              dockerfile = build.get("dockerfile")
              if dockerfile in image_map:
                  svc["image"] = image_map[dockerfile]

          with open("docker-compose.release.yml", "w") as f:
              yaml.dump(compose, f, default_flow_style=False, sort_keys=False)

          print("docker-compose.release.yml generated.")
          EOF

      - name: Verify release assets exist
        run: |
          set -euo pipefail
          test -s docker-compose.release.yml || { echo "docker-compose.release.yml is missing or empty!"; exit 1; }
          echo "Release assets verified."

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          name: Data Visualisation Docker Release ${{ steps.tag.outputs.value }}
          files: |
            docker-compose.release.yml
            setup.sh