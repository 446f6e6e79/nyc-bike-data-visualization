name: Docker Release Pipeline

# Builds and pushes all Docker images on release and seeds the database.
on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/nyc-bike-data-visualisation
  PLATFORMS: linux/amd64,linux/arm64

jobs:
    
  prepare:                  # Extracts the release tag from the GitHub ref and makes it available to downstream jobs.
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve release tag
        id: tag
        run: echo "value=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

  build-backend:            # Builds and pushes the backend image to GitHub Container Registry.
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.backend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ needs.prepare.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:           # Builds and pushes the frontend image to GitHub Container Registry.
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.frontend
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ needs.prepare.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-postgres:           # Builds and pushes the postgres image to GitHub Container Registry.
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.postgres
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-postgres:${{ needs.prepare.outputs.tag }}-unseeded
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-seeder:             # Builds and pushes the seeder image to GitHub Container Registry.
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push seeder image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockers/Dockerfile.seeder
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-seeder:${{ needs.prepare.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-seeder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  seed:             # Runs the seeder container to seed the database, exports the dump, and builds the final preloaded postgres image.
    needs: [prepare, build-postgres, build-seeder]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ env.PLATFORMS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start postgres container for seeding
        run: |
          docker run -d --name pg \
            -e POSTGRES_DB=citibike \
            -e POSTGRES_USER=citibike \
            -e POSTGRES_PASSWORD=citibike \
            ${{ env.IMAGE_PREFIX }}-postgres:${{ needs.prepare.outputs.tag }}-unseeded
          until docker logs pg 2>&1 | grep -q "database system is ready to accept connections"; do
            echo "Waiting for postgres..."; sleep 2
          done

      - name: Seed default dataset
        timeout-minutes: 480
        run: |
          docker run --rm \
            --network container:pg \
            -e DATABASE_URL=postgresql://citibike:citibike@localhost:5432/citibike \
            -e PARALLEL_MONTHS=1 \
            -e DB_LOADER_WORKERS=2 \
            -e LOG_LEVEL=INFO \
            ${{ env.IMAGE_PREFIX }}-seeder:${{ needs.prepare.outputs.tag }}

      - name: Export database dump
        run: |
          docker exec pg pg_dump -U citibike --no-owner --no-privileges citibike \
            | gzip > citibike_data.sql.gz
          echo "Dump size: $(du -sh citibike_data.sql.gz | cut -f1)"

      - name: Stop and remove postgres container
        if: always()
        run: docker rm -f pg

      - name: Prepare preloaded Dockerfile
        run: |
          cat > /tmp/Dockerfile.preloaded << 'EOF'
          FROM ${{ env.IMAGE_PREFIX }}-postgres:${{ needs.prepare.outputs.tag }}-unseeded
          COPY citibike_data.sql.gz /docker-entrypoint-initdb.d/99_citibike_data.sql.gz
          EOF

      - name: Build and push preloaded postgres image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: /tmp/Dockerfile.preloaded
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-postgres:${{ needs.prepare.outputs.tag }}
            ${{ env.IMAGE_PREFIX }}-postgres:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Remove seeder image
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          OWNER="${{ github.repository_owner }}"
          PACKAGE="nyc-bike-data-visualisation-seeder"
          for ENDPOINT in \
              "user/packages/container/${PACKAGE}/versions" \
              "orgs/${OWNER}/packages/container/${PACKAGE}/versions"; do
            ID=$(gh api "$ENDPOINT" --paginate 2>/dev/null \
              | jq -r ".[] | select(.metadata.container.tags | contains([\"$TAG\"])) | .id" \
              | head -1)
            [ -z "$ID" ] && continue
            gh api --method DELETE "${ENDPOINT%/versions}/$ID" \
              && { echo "Deleted $PACKAGE:$TAG (id $ID)"; break; }
          done

      - name: Remove temporary unseeded postgres image
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare.outputs.tag }}-unseeded"
          OWNER="${{ github.repository_owner }}"
          PACKAGE="nyc-bike-data-visualisation-postgres"
          for ENDPOINT in \
              "user/packages/container/${PACKAGE}/versions" \
              "orgs/${OWNER}/packages/container/${PACKAGE}/versions"; do
            ID=$(gh api "$ENDPOINT" --paginate 2>/dev/null \
              | jq -r ".[] | select(.metadata.container.tags | contains([\"$TAG\"])) | .id" \
              | head -1)
            [ -z "$ID" ] && continue
            gh api --method DELETE "${ENDPOINT%/versions}/$ID" \
              && { echo "Deleted $PACKAGE:$TAG (id $ID)"; break; }
          done

  release:                 # Generates a docker-compose.release.yml with the new image tags and attaches it to the GitHub Release.
    needs: [prepare, build-backend, build-frontend, build-postgres, build-seeder]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate docker-compose.release.yml
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          PREFIX: ${{ env.IMAGE_PREFIX }}
        run: |
          yq eval "
            .services.postgres.image = strenv(PREFIX) + \"-postgres:\" + strenv(TAG) |
            .services.backend.image  = strenv(PREFIX) + \"-backend:\"  + strenv(TAG) |
            .services.frontend.image = strenv(PREFIX) + \"-frontend:\" + strenv(TAG) |
            del(.services.seeder) |
            del(.services.*.build) |
            del(.services.backend.depends_on.seeder)
          " docker-compose.yml > docker-compose.release.yml

      - name: Attach assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Data Visualisation Docker Release ${{ needs.prepare.outputs.tag }}
          files: docker-compose.release.yml
